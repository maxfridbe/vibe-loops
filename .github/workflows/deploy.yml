name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # The app has zero npm package dependencies (runtime libraries are
      # vendored in lib/). Only build tools are installed here: the
      # TypeScript compiler (pinned to the version the project targets)
      # and the sqlite3 CLI used to assemble the loop library.
      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q sqlite3
          npm install -g typescript@6.0.3

      - name: Build
        run: ./Build.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dist
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
